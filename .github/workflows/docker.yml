name: Docker Build

on:
  push:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # (b) Install Docker & verify version
      - name: Check Docker version
        run: docker --version

      # (a) Build Docker image
      - name: Build Docker Image
        run: docker build -t my-image .
